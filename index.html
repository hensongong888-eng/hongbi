<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <!-- 手机适配核心标签（已配置好，解决手机打不开） -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>红笔 - AI小红书文案神器</title>
  <style>
    :root {
      --red: #EF2442;
      --red-light: #FF6881;
      --red-pale: #FFF0F2;
      --ink: #1A0A0C;
      --gray: #6B5B5E;
      --gray-light: #F5EEEF;
      --white: #FFFCFC;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Noto Sans SC', sans-serif; background: var(--white); color: var(--ink); min-height: 100vh; padding:16px; }
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding:20px 8px; border-bottom:1px solid #F0E8E9;
      position: sticky; top:0; background: rgba(255,252,252,0.95);
      backdrop-filter: blur(8px); z-index:100;
    }
    .logo { font-family: 'Noto Serif SC', serif; font-size:22px; font-weight:900; color:var(--red); letter-spacing:2px; display:flex; align-items:center; gap:8px; }
    .logo-dot { width:8px; height:8px; background:var(--red); border-radius:50%; }
    .nav-badge { background:var(--red); color:white; font-size:12px; padding:6px 18px; border-radius:100px; font-weight:500; cursor:pointer; transition:all 0.2s; }
    .nav-badge:hover { background:#CC331A; transform:translateY(-1px); }
    .hero { padding:40px 12px 60px; max-width:1100px; margin:0 auto; display:grid; grid-template-columns:1fr; gap:30px; align-items:start; }
    .hero-tag { display:inline-flex; align-items:center; gap:6px; background:var(--red-pale); color:var(--red); font-size:12px; font-weight:500; padding:5px 14px; border-radius:100px; margin-bottom:24px; letter-spacing:1px; }
    h1 { font-family: 'Noto Serif SC', serif; font-size:42px; font-weight:900; line-height:1.15; color:var(--ink); margin-bottom:20px; }
    h1 span { color:var(--red); }
    .hero-sub { font-size:16px; color:var(--gray); line-height:1.7; margin-bottom:36px; }
    .stats { display:flex; gap:32px; margin-bottom:40px; }
    .stat-num { font-family: 'Noto Serif SC', serif; font-size:28px; font-weight:900; color:var(--red); }
    .stat-label { font-size:12px; color:var(--gray); margin-top:2px; }
    .free-badge { display:inline-flex; align-items:center; gap:8px; font-size:13px; color:var(--gray); }
    /* 新增输入输出样式 */
    .input-wrap{margin:20px 0;}
    textarea{width:100%;min-height:130px;padding:14px;border:1px solid var(--gray-light);border-radius:12px;font-size:16px;outline:none;}
    .gen-btn{width:100%;padding:16px;background:var(--red);color:#fff;border:0;border-radius:12px;font-size:17px;font-weight:bold;margin:12px 0;cursor:pointer;}
    .result-box{margin-top:20px;padding:16px;background:var(--red-pale);border-radius:12px;white-space:pre-line;line-height:1.7;}
    .copy-btn{padding:8px 16px;margin-top:10px;background:#3672D9;color:white;border:0;border-radius:8px;cursor:pointer;}
  </style>
</head>
<body>
<header>
  <div class="logo"><div class="logo-dot"></div>红笔文案</div>
  <div class="nav-badge">免费生成文案</div>
</header>
<div class="hero">
  <div>
    <div class="hero-tag">AI小红书爆款文案神器</div>
    <h1>一键生成<span>带货文案</span>，发圈发笔记不愁</h1>
    <div class="hero-sub">输入产品关键词，自动生成多条种草文案，朋友圈/小红书/短视频通用</div>
    <div class="stats">
      <div><div class="stat-num">10W+</div><div class="stat-label">已生成文案</div></div>
      <div><div class="stat-num">免费</div><div class="stat-label">无额度限制</div></div>
    </div>
    <!-- 文案生成区域 -->
    <div class="input-wrap">
      <textarea id="userInput" placeholder="输入产品关键词：例如护手霜、平价保湿、秋冬必备"></textarea>
      <button class="gen-btn" onclick="createText()">立即生成文案</button>
      <div class="result-box" id="result"></div>
      <button class="copy-btn" onclick="copyTxt()">复制全部文案</button>
    </div>
  </div>
</div>

<script>
// 内置文案生成，不用后端接口，手机100%正常打开
function createText(){
  let key = document.getElementById('userInput').value.trim();
  let resDom = document.getElementById('result');
  if(!key){
    alert('请填写产品关键词');
    return;
  }
  resDom.innerText='文案生成中...';
  // 固定文案模板
  let arr = [
`✨${key}｜挖到宝了！性价比直接拉满
日常自用闭眼入，细节做工超出预期`,
`💡无限回购｜这款${key}真的好用
用过身边好几个朋友都跟着入手`,
`🔥种草实测｜${key}刚需好物
性价比在线，学生党/上班族友好`
  ]
  resDom.innerText = arr.join('\n\n');
}
// 复制功能
function copyTxt(){
  let content = document.getElementById('result').innerText;
  navigator.clipboard.writeText(content);
  alert('文案复制成功！');
}
</script>
</body>
</html>
